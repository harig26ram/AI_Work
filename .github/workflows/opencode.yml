name: opencode
on: 
  issue_comment: 
    types: [created]
jobs:
  opencode:
    if: contains(github.event.comment.body, '/oc')
    runs-on: ubuntu-latest
    permissions:
      id-token: write
      contents: write
      issues: write
      pull-requests: write
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 1
          persist-credentials: false
      - name: Install Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
      - name: Install OpenCode
        run: npm install -g opencode-ai
      - name: Run OpenCode
        env:
          OPENROUTER_API_KEY: ${{ secrets.OPENROUTER_API_KEY }}
        run: |
          opencode run --model openrouter/nvidia/nemotron-3-super-120b-a12b:free "Read the issue title and body, then provide a helpful response. Issue title: ${{ github.event.issue.title }} Issue body: ${{ github.event.issue.body }}"
